# boxBot Configuration
# Copy this file to config.yaml and customize for your setup.

# ── Agent ─────────────────────────────────────────────────────────────
agent:
  name: "boxBot"
  wake_word: "hey box"
  # Models are set in .env (BOXBOT_MODEL_LARGE, BOXBOT_MODEL_SMALL)
  # Large model: conversations, reasoning, memory extraction, skill creation
  # Small model: photo tagging, intent classification, structured extraction,
  #              wake-word transcript filtering, routine pre-processing
  # Maximum conversation turns before auto-compaction
  max_turns: 20

# ── Schedule ──────────────────────────────────────────────────────────
# The agent's internal planning system (triggers + to-do list).
# NOT the family calendar — calendar events are managed by skills.
schedule:
  # Wake cycle — recurring triggers seeded into the database on first
  # boot. After first boot, runtime state in data/scheduler/scheduler.db
  # is authoritative. The agent can modify these at runtime.
  wake_cycle:
    - cron: "0 7 * * *"       # 7:00 AM daily
      description: "Morning briefing"
      instructions: >
        Check weather forecast, review to-do list, update displays,
        prepare daily briefing for household members
    - cron: "0 12 * * *"      # Noon
      description: "Midday check"
      instructions: >
        Review to-do list for actionable items, check for pending
        triggers, update displays if data is stale
    - cron: "0 20 * * *"      # 8:00 PM
      description: "Evening review"
      instructions: >
        Review to-do list, summarize the day's activity, set triggers
        for tomorrow's tasks, update displays

  # How long the agent stays awake after completing triggered tasks (seconds)
  idle_timeout: 300

  # Default expiry for person-condition triggers (days).
  # Triggers with only a person condition expire after this period
  # if the person is never detected.
  person_trigger_expiry_days: 7

# ── Display ───────────────────────────────────────────────────────────
display:
  # Display rotation interval during idle (seconds)
  rotation_interval: 30
  # Displays to rotate through when idle
  idle_displays:
    - "clock"
    - "weather_simple"
  # Brightness (0.0 - 1.0)
  brightness: 0.8
  # Night mode (reduced brightness)
  night_mode:
    enabled: true
    start: "22:00"
    end: "07:00"
    brightness: 0.3

# ── Hardware ──────────────────────────────────────────────────────────
hardware:
  camera:
    # Sensor rotation (degrees, applied by picamera2)
    rotation: 180
    # Low-res stream for CPU motion detection [width, height]
    lores_resolution: [320, 240]
    # Full-res photo capture resolution [width, height]
    photo_resolution: [4608, 2592]
  hailo:
    # Model paths for Hailo-8L inference
    models:
      yolo_person: "/usr/share/hailo-models/yolov5s_personface_h8l.hef"
      reid_repvgg: "data/perception/models/repvgg_a0_person_reid_512.hef"
    # Load models into Hailo memory at startup
    preload_models: true
  microphone:
    device_name: "ReSpeaker"
    sample_rate: 16000
    capture_channels: 6           # 4 raw mic + 2 processed
    output_channel: 0             # ch 0 = processed/beamformed
    chunk_duration_ms: 64         # ~1024 frames at 16kHz
    doa_enabled: true
    led_brightness: 0.5
  speaker:
    device_name: "hdmi"           # HDMI audio output (use "boxbot_speaker" after ALSA dual-output setup)
    sample_rate: 24000            # match TTS output
    default_volume: 0.7

# ── Camera ────────────────────────────────────────────────────────────
camera:
  resolution: [1280, 720]
  # Framerate for perception scanning
  scan_fps: 5
  # Framerate during active interaction
  active_fps: 15

# ── Voice ─────────────────────────────────────────────────────────────
voice:
  # Wake word detection
  wake_word:
    engine: "openwakeword"
    word: "hey_jarvis"            # built-in model; swap to "bb" for custom
    confidence_threshold: 0.7
    # model_path: null            # custom model path (null = use built-in)

  # Voice activity detection (Silero)
  vad:
    threshold: 0.5
    min_speech_duration: 250      # ms
    min_silence_duration: 100     # ms

  # Turn detection — when an utterance is considered "finished"
  turn_detection:
    silence_threshold: 800        # ms of silence before finalizing
    max_utterance_duration: 60    # seconds hard cap
    inter_utterance_gap: 300      # ms between utterances

  # Barge-in — how the user interrupts BB's speech
  #
  # mode: "wake_word" (default) — STT detaches while BB is speaking,
  #   so chatter and BB's own residual voice can't hit the transcript.
  #   To interrupt or continue, the user says the wake word again,
  #   which stops playback and re-attaches STT.
  # mode: "graduated" — legacy VAD-based three-stage yield (ignore →
  #   fade → full stop). The ignore/fade/confirm knobs below apply
  #   only in this mode.
  barge_in:
    enabled: true
    mode: "wake_word"
    ignore_duration: 200          # ms — continue at full volume (graduated mode)
    fade_duration: 200            # ms — fade to 50% (graduated mode)
    confirm_duration: 400         # ms total — full stop (graduated mode)
    fade_volume: 0.5

  # Speaker diarization (pyannote)
  diarization:
    engine: "pyannote"
    model: "pyannote/speaker-diarization-3.1"
    embedding_model: "pyannote/wespeaker-voxceleb-resnet34-LM"
    min_speakers: 1
    max_speakers: 6
    match_threshold: 0.65

  # Speech-to-text
  stt:
    provider: "elevenlabs"
    model: "scribe_v2"
    language: "en"

  # Text-to-speech
  tts:
    provider: "elevenlabs"
    voice_id: ""                  # must be configured
    model: "eleven_turbo_v2_5"
    stability: 0.5
    similarity_boost: 0.75
    optimize_streaming_latency: 3

  # Voice session lifecycle
  session:
    active_timeout: 30            # seconds before suspending
    suspend_timeout: 180          # seconds before ending
    max_session_duration: 600

# ── Perception ────────────────────────────────────────────────────────
perception:
  # CPU motion detection sensitivity (uint8 0-255 range).
  # Lower = more sensitive (triggers on small changes).
  # Higher = less sensitive (ignores lighting drift, sensor noise).
  motion_threshold: 12.0

  # Visual ReID confidence tiers (cosine similarity)
  reid_high_threshold: 0.85       # confident match — can fire triggers
  reid_low_threshold: 0.60        # tentative match — wait for voice

  # Speaker ID matching threshold
  speaker_threshold: 0.75

  # Seconds without person detection before DETECTED → DORMANT
  presence_timeout: 30

  # YOLO re-check interval in DETECTED state (seconds)
  heartbeat_interval: 5

  # Max representative embeddings per person
  max_visual_embeddings: 200
  max_voice_embeddings: 50

  # Crop image retention for debugging (days)
  crop_retention_days: 1
  crop_retention_days_debug: 7

  # DOA-to-camera mapping
  doa_forward_angle: 0              # ReSpeaker DOA angle → camera center
  camera_hfov: 120                  # Pi Camera Module 3 Wide horizontal FOV

  # Voice identity matching threshold (cosine similarity, 0.55-0.65 range)
  voice_match_threshold: 0.60

# ── Memory ────────────────────────────────────────────────────────────
memory:
  # Max memories to inject into agent context
  max_context_memories: 15
  # Importance decay rate per day (multiplied daily)
  decay_rate: 0.98
  # Minimum importance to remain in active pool
  archive_threshold: 0.1

# ── Photos ────────────────────────────────────────────────────────────
photos:
  storage_path: "data/photos"
  # Maximum percentage of disk space for photo storage (0-100).
  # Measured against the filesystem where storage_path resides.
  # Includes active and soft-deleted photos.
  max_storage_percent: 50
  # Maximum image resolution on ingest [width, height].
  # Incoming photos are resized to fit within these bounds
  # (preserving aspect ratio). Saves disk space significantly
  # for camera captures while remaining well above display resolution.
  max_image_resolution: [1920, 1080]
  # Days to retain soft-deleted photos before permanent purge.
  soft_delete_retention_days: 30
  slideshow:
    seconds_per_photo: 15
    transition: "fade"
    strategy: "random"    # random, chronological, seasonal
  backup:
    enabled: false
    # provider: "s3"
    # bucket: "your-bucket-name"
    # region: "us-east-1"

# ── Sandbox ──────────────────────────────────────────────────────────
sandbox:
  # Root directory for sandbox state (venv, scripts, output, tmp).
  # /var/lib/boxbot-sandbox is the default and works on standard Linux
  # distros — the boxbot-sandbox system user can reach it without needing
  # traverse permission on the operator's home dir. Override with another
  # path (e.g. /opt/boxbot-sandbox) by also passing
  # BOXBOT_SANDBOX_DIR=<path> to scripts/setup-sandbox.sh.
  runtime_dir: "/var/lib/boxbot-sandbox"
  # OS user for sandbox script execution (created by setup-sandbox.sh)
  user: "boxbot-sandbox"
  # Script execution timeout (seconds)
  timeout: 30
  # Memory limit per script (MB)
  memory_limit_mb: 256
  # Network access for scripts (needed for API calls in skills)
  allow_network: true
  # Package install approval timeout (seconds, 0 = no timeout)
  install_approval_timeout: 300
  # Channels for package install approval
  install_approval_channels:
    - "display"          # tap YES on touchscreen
    - "whatsapp"         # admin replies YES via WhatsApp

# ── SDK Authoring ────────────────────────────────────────────────────
# Controls how agent-created skills/displays are handled.
# The agent creates these through boxbot_sdk (declarative builder),
# NOT by writing raw code.
sdk:
  # Agent-created skills auto-activate (their logic runs sandboxed)
  auto_activate_skills: true
  # Agent-created displays require user confirmation before activation
  # (display code is generated from declarative specs but runs in main process)
  auto_activate_displays: false

# ── WhatsApp ──────────────────────────────────────────────────────────
# WhatsApp config is in a separate file: config/whatsapp.yaml
# See config/whatsapp.example.yaml

# ── Logging ───────────────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/boxbot.log"
  max_size_mb: 50
  backup_count: 5
